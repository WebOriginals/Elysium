faq:
  title: Часто задаваемые вопросы
  description: Ответы на часто задаваемые вопросы всё, что нужно знать о создании и запуске лендинга для вашего бизнеса.
  items:
    - label: Что такое лендинг и зачем он нужен для моего бизнеса?
      content: Лендинг — это одностраничный сайт, созданный для продвижения конкретного продукта или услуги. Он помогает увеличить конверсии и привлечь целевых клиентов.
      defaultOpen: true
    - label: Как долго займет разработка лендинга для моего проекта?
      content: Время разработки зависит от сложности проекта, но в среднем мы создаем лендинги за 7-14 рабочих дней.
    - label: Могу ли я внести изменения в лендинг после его запуска?
      content: Конечно! Мы предоставляем доступ для редактирования контента, а также оказываем поддержку для внесения изменений.
    - label: Какие технологии вы используете при разработке лендингов?
      content: Мы используем современные веб-технологии, такие как HTML5, CSS3, JavaScript, а также системы управления контентом для удобного обновления информации.
    - label: Как я могу отслеживать эффективность моего лендинга?
      content: Мы интегрируем системы аналитики, такие как Google Analytics, для отслеживания посещаемости, конверсий и других ключевых показателей.
    - label: Что входит в стоимость разработки лендинга?
      content: Стоимость включает весь процесс — от анализа ваших потребностей и разработки макета до финального тестирования и публикации на хостинге.
